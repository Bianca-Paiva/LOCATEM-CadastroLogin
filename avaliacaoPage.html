<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <!-- reset mantido sem alterações -->
    <link rel="stylesheet" href="./src/css/reset.css" />

    <!-- estilos do header (mobile + desktop) -->
    <link rel="stylesheet" href="./src/css/header style/header.css" />

    <!-- estilos exclusivos desta página -->
    <link rel="stylesheet" href="./src/css/avaliacaoPage.css" />

    <title>Avaliações de Locações</title>
</head>

<body>

    <!-- ============================================================
        WRAPPER GERAL
        Envolve todo o conteúdo e aplica o gradiente de fundo.
    ============================================================ -->
    <div class="app">

        <!-- ============================================================
            HEADER MOBILE (320px – 768px)
            Exibido apenas em telas pequenas via CSS (display:none no ≥1024px).
            Contém: hamburguer, logo, carrinho e barra de busca.
        ============================================================ -->
        <header class="header-mobile">
            <div class="linha-topo-mobile">
                <div class="lado-esquerdo">
                    <!-- Abre o menu lateral em mobile -->
                    <button class="menu-btn" aria-label="Abrir menu">
                        <img src="./src/images/menuHamburguer.png" alt="Menu" />
                    </button>

                    <!-- Logo — redireciona para home -->
                    <a href="./principalPage.html" class="logo">
                        <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM" />
                        LOCATEM
                    </a>
                </div>

                <!-- Carrinho com badge de quantidade -->
                <a href="./carrinho.html" class="carrinho-btn" aria-label="Carrinho de compras">
                    <img src="./src/images/carrinho.svg" alt="Carrinho" />
                    <span class="quantidade-carrinho">2</span>
                </a>
            </div>

            <!-- Barra de busca — linha separada abaixo do topo -->
            <form class="barra-pesquisa-mobile" role="search">
                <img src="./src/images/lupa.png" alt="" aria-hidden="true" />
                <input type="search" placeholder="Qual ferramenta você precisa hoje?"
                    aria-label="Pesquisar ferramentas" />
            </form>
        </header>

        <!-- ============================================================
            HEADER DESKTOP (≥1024px)
            Oculto em mobile via CSS. Logo + busca central + botão chat.
        ============================================================ -->
        <header class="header-desktop">
            <div class="linha-topo-desktop">
                <a href="./principalPage.html" class="logo">
                    <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM" />
                    LOCATEM
                </a>

                <form class="barra-pesquisa" role="search">
                    <button type="submit" class="lupa-btn" aria-label="Buscar">
                        <img src="./src/images/lupa.png" alt="" aria-hidden="true" />
                    </button>
                    <input type="search" placeholder="Qual ferramenta você precisa hoje?"
                        aria-label="Pesquisar ferramentas" />
                </form>

                <button class="chat" aria-label="Abrir chat de suporte">
                    <img src="./src/images/chat.png" alt="Chat" />
                </button>
            </div>
        </header>

        <!-- ============================================================
            NAVEGAÇÃO DESKTOP
            Visível apenas em ≥1024px. Ícone + label para cada seção.
        ============================================================ -->
        <nav class="menu-navegacao-desktop" aria-label="Menu principal">
            <a href="./principalPage.html">
                <img src="./src/images/home.png" alt="" aria-hidden="true" />Início
            </a>
            <a href="./carrinho.html">
                <img src="./src/images/carrinho.svg" alt="" aria-hidden="true" />Carrinho
            </a>
            <a href="#">
                <img src="./src/images/relogio.png" alt="" aria-hidden="true" />Histórico
            </a>
            <a href="#">
                <img src="./src/images/calendario.png" alt="" aria-hidden="true" />Agendamento
            </a>
            <a href="#">
                <img src="./src/images/notificacoes.png" alt="" aria-hidden="true" />Notificações
            </a>
            <a href="./avaliacaoPage.html" aria-current="page">
                <img src="./src/images/Star.png" alt="" aria-hidden="true" />Avaliações
            </a>
            <a href="#">
                <img src="./src/images/suporte.png" alt="" aria-hidden="true" />Suporte
            </a>
            <a href="./login.html">
                <img src="./src/images/usuario.png" alt="" aria-hidden="true" />Entrar
            </a>
        </nav>

        <!-- ============================================================
            ÁREA DE CONTEÚDO PRINCIPAL
            Em desktop, recua para respeitar a nav lateral.
        ============================================================ -->
        <div class="content-area">

            <div class="tituloPage">
                <h1>Minhas Avaliações</h1>
                <p>Avalie os produtos que você locou e ajude outros locatários.</p>
            </div>

            <!-- Tabs: alterna entre avaliações pendentes e realizadas -->
            <nav class="tabs" role="tablist" aria-label="Filtro de avaliações">
                <button class="tab-btn active" role="tab" aria-selected="true" data-tab="pendentes">Pendentes</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-tab="realizadas">Realizadas</button>
            </nav>

            <!-- Painel: avaliações ainda não enviadas -->
            <section class="tab-panel active" id="tab-pendentes" role="tabpanel">
                <div id="pendentes-list"></div>
            </section>

            <!-- Painel: avaliações já enviadas -->
            <section class="tab-panel" id="tab-realizadas" role="tabpanel">
                <div id="realizadas-list"></div>
            </section>
            
        </div><!-- /content-area -->
    </div><!-- /app -->

    <!-- ============================================================
        MODAL DE AVALIAÇÃO
        Abre ao clicar num card. Gerenciado inteiramente por JS.
    ============================================================ -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Avaliar produto">
        <div class="modal" id="modalBox">

            <!-- Cabeçalho do modal: botão voltar + badge da loja -->
            <div class="modal-header">
                <button class="modal-back" id="modalBack" aria-label="Fechar modal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                    Voltar
                </button>
            </div>

            <!-- Produto + sub-avaliações (preenchido pelo JS) -->
            <div class="modal-product" id="modalProduct"></div>

            <!-- Campo de observações com toggle de visibilidade -->
            <div class="modal-obs">
                <button class="obs-toggle expanded" id="obsToggle" aria-expanded="true">
                    Observações (opcional)
                    <span class="chevron" aria-hidden="true">
                        <svg width="15" height="8" viewBox="0 0 15 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1.00009 1L7.16118 6.25L13.3223 1" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </span>
                </button>
                <textarea class="obs-textarea" id="obsText"
                    placeholder="Compartilhe sua experiência com este produto..."></textarea>
            </div>

            <!-- Botão de envio da avaliação -->
            <div class="modal-footer">
                <button class="btn-enviar" id="btnEnviar">Enviar</button>
            </div>

            <!-- Carrossel com outros itens pendentes de avaliação -->
            <p class="modal-carousel-title">Outros itens para avaliar</p>
            <div class="modal-carousel" id="modalCarousel"></div>

        </div>
    </div>

    <!-- Feedback de confirmação após envio -->
    <div class="toast" id="toast" role="status" aria-live="polite">Avaliação enviada com sucesso!</div>

    <script src="./src/js/avaliacaoPage.js"></script>
</body>

</html>
