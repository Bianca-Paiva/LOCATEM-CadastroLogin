<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCATEM</title>

    <link rel="stylesheet" href="./src/css/reset.css" />
    <link rel="stylesheet" href="./src/css/responsivo.css" />
    <link rel="stylesheet" href="./src/css/styles.css" />
</head>

<body>
    <header>
        <img src="./src/images/Logo com nome.png" alt="Logo LOCATEM" class="logo" />
    </header>

    <main>
        <div class="topo">
            <h1 class="titulo">Entre na sua conta</h1>
            <p class="paragrafo">Acesse sua conta para continuar</p>
        </div>
        <div class="card">
            <form action="#" method="post">
                <div>
                    <label for="email" class="label" label>E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required class="input" />
                </div>

                <div class="campoSenha">
                    <label for="senha" class="label">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required
                        class="input" />
                </div>

                <a href="#">Esqueci minha senha</a>

                <button type="submit">Entrar</button>
            </form>

            <div class="criarConta">
                <p>Não tem uma conta?</p>
                <a href="#">Criar uma conta</a>
            </div>
        </div>
    </main>
</body>

</html>
