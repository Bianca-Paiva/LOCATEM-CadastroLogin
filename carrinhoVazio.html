<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./src/css/reset.css" />
    <link rel="stylesheet" href="./src/css/carrinhoVazio.css" />

    <title>LOCATEM</title>
</head>

<body>
    <div class="app">

        <!-- HEADER MOBILE -->
        <header class="header-mobile">

            <!-- LINHA SUPERIOR -->
            <div class="linha-topo-mobile">

                <!-- AGRUPAMENTO ESQUERDO -->
                <div class="lado-esquerdo">

                    <button class="menu-btn">
                        <img src="./src/images/menuHamburguer.png" alt="Menu">
                    </button>

                    <a href="./principalPage.html" class="logo">
                        <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                        LOCATEM
                    </a>

                </div>

                <!-- DIREITA -->
                <a href="#" class="carrinho-btn">
                    <img src="./src/images/carrinho.svg" alt="Carrinho">
                    <span class="quantidade-carrinho">2</span>
                </a>

            </div>

            <!-- Barra de pesquisa -->
            <form class="barra-pesquisa-mobile">
                <img src="./src/images/lupa.png" alt="Buscar">
                <input type="search" placeholder="Qual ferramenta você precisa hoje?"
                    aria-label="Pesquisar ferramentas" />
            </form>
        </header>

        <!-- HEADER DESKTOP-->
        <header class="header-desktop">
            <div class="linha-topo-desktop">

                <!-- Logo da LOCATEM com link para a página principal -->
                <a href="./principalPage.html" class="logo">
                    <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                    LOCATEM
                </a>

                <!-- Barra de pesquisa -->
                <form class="barra-pesquisa">
                    <button type="submit" class="lupa-btn">
                        <img src="./src/images/lupa.png" alt="Buscar">
                    </button>
                    <input type="search" placeholder="Pesquisar..." aria-label="Pesquisar ferramentas" />
                </form>

                <!-- Botão de acesso ao chat -->
                <button class="chat">
                    <img src="./src/images/chat.png" alt="Chat">
                </button>
            </div>
        </header>

        <!-- Nav desktop fica abaixo da linha superior -->
        <nav class="menu-navegacao-desktop">
            <a href="./principalPage.html"><img src="./src/images/home.png" alt="">Início</a>
            <a href="#"><img src="./src/images/carrinho.png" alt="">Carrinho</a>
            <a href="#"><img src="./src/images/relogio.png" alt="">Histórico</a>
            <a href="#"><img src="./src/images/calendario.png" alt="">Agendamento</a>
            <a href="#"><img src="./src/images/notificacoes.png" alt="">Notificações</a>
            <a href="#"><img src="./src/images/Star.png" alt="">Avaliações</a>
            <a href="#"><img src="./src/images/suporte.png" alt="">Suporte</a>
            <a href="./login.html"><img src="./src/images/usuario.png" alt="">Entrar</a>
        </nav>

    </div>
</body>

</html>
