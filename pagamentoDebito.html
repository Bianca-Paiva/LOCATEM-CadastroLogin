<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/pagamentoDebito.css" />
    <link rel="stylesheet" href="./src/css/reset.css">
    <title>LOCATEM</title>
</head>

<body>
    <div class="app">

        <!-- HEADER -->
        <header class="topo">
            <div class="linha-topo">
                <a href="./principalPage.html" class="logo">
                    <img src="./src/images/LogoIcon.png" alt="Logo LOCATEM">
                    LOCATEM
                </a>

                <button class="chat">
                    <img src="./src/images/chat.png" alt="Chat">
                </button>
            </div>
        </header>

        <!-- CONTEÚDO -->
        <main class="pagamento-container">
            <section class="titulo-pagina">
                <button class="btn-voltar" aria-label="Voltar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
                    </svg>
                </button>
                <h1>Pagamento com Cartão de Débito</h1>
            </section>

            <!-- DADOS DO CARTÃO -->
            <section class="card">
                <div class="card-header">
                    <h2>Dados do Cartão de Débito</h2>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-credit-card" viewBox="0 0 16 16">
                        <path
                            d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v1h14V4a1 1 0 0 0-1-1zm13 4H1v5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1z" />
                        <path d="M2 10a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z" />
                    </svg>
                </div>

                <form class="form-cartao">
                    <div class="campo">
                        <label for="numeroCartao">Número do Cartão</label>
                        <input id="numeroCartao" type="text" placeholder="0000 0000 0000 0000" />
                    </div>

                    <div class="campo">
                        <label for="nomeTitular">Nome do Titular</label>
                        <input id="nomeTitular" type="text" placeholder="NOME COMO ESTÁ NO CARTÃO" />
                    </div>

                    <div class="linha-campos">
                        <div class="campo">
                            <label for="validade">Validade</label>
                            <input id="validade" type="text" placeholder="MM/AA" />
                        </div>

                        <div class="campo">
                            <label for="cvv">CVV</label>
                            <input id="cvv" type="text" placeholder="123" />
                        </div>
                    </div>
                </form>
            </section>

            <!-- RESUMO -->
            <section class="card resumo-pedido">
                <h2>Resumo do Pedido</h2>

                <div class="linha-total">
                    <span>Total</span>
                    <span>R$ 15,00</span>
                </div>

                <button class="btn-pagar" type="button">Confirmar Pagamento</button>

                <div class="seguranca">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        class="bi bi-lock-fill" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M8 0a4 4 0 0 1 4 4v2.05a2.5 2.5 0 0 1 2 2.45v5a2.5 2.5 0 0 1-2.5 2.5h-7A2.5 2.5 0 0 1 2 13.5v-5a2.5 2.5 0 0 1 2-2.45V4a4 4 0 0 1 4-4m0 1a3 3 0 0 0-3 3v2h6V4a3 3 0 0 0-3-3" />
                    </svg>
                    <p>Pagamento 100% seguro</p>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
